openapi: 3.0.3

info:
  title: LifeOS API
  version: 0.1.0

servers:
  - url: http://localhost:8080

tags:
  - name: Tasks
  - name: Projects
  - name: Tags

paths:
  /health:
    get:
      operationId: healthCheck
      tags:
        - Health

      responses:
        "200":
          description: OK

  /tasks:
    get:
      operationId: listTasks
      tags:
        - Tasks

      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/TaskStatus"

        - in: query
          name: projectId
          schema:
            type: string

        - in: query
          name: tagId
          schema:
            type: string

        - in: query
          name: limit
          schema:
            type: integer
            default: 50

        - in: query
          name: offset
          schema:
            type: integer
            default: 0

      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: object
                required:
                  - items

                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"

    post:
      operationId: createTask
      tags:
        - Tasks

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"

      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{taskId}:
    get:
      operationId: getTask
      tags:
        - Tasks

      parameters:
        - $ref: "#/components/parameters/TaskId"

      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

        "404":
          description: Task not found

    patch:
      operationId: updateTask
      tags:
        - Tasks

      parameters:
        - $ref: "#/components/parameters/TaskId"

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"

      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

    delete:
      operationId: deleteTask
      tags:
        - Tasks

      parameters:
        - $ref: "#/components/parameters/TaskId"

      responses:
        "204":
          description: Task deleted

  /projects:
    get:
      operationId: listProjects
      tags:
        - Projects

      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: object
                required:
                  - items

                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"

    post:
      operationId: createProject
      tags:
        - Projects

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"

      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags:
        - Projects

      parameters:
        - $ref: "#/components/parameters/ProjectId"

      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

        "404":
          description: Project not found

    patch:
      operationId: updateProject
      tags:
        - Projects

      parameters:
        - $ref: "#/components/parameters/ProjectId"

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"

      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

    delete:
      operationId: deleteProject
      tags:
        - Projects

      parameters:
        - $ref: "#/components/parameters/ProjectId"

      responses:
        "204":
          description: Project deleted

  /tags:
    get:
      operationId: listTags
      tags:
        - Tags

      responses:
        "200":
          description: Tag list
          content:
            application/json:
              schema:
                type: object
                required:
                  - items

                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tag"

    post:
      operationId: createTag
      tags:
        - Tags

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"

      responses:
        "201":
          description: Tag created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"

  /tags/{tagId}:
    get:
      operationId: getTag
      tags:
        - Tags

      parameters:
        - $ref: "#/components/parameters/TagId"

      responses:
        "200":
          description: Tag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"

        "404":
          description: Tag not found

    patch:
      operationId: updateTag
      tags:
        - Tags

      parameters:
        - $ref: "#/components/parameters/TagId"

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTagRequest"

      responses:
        "200":
          description: Updated tag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"

    delete:
      operationId: deleteTag
      tags:
        - Tags

      parameters:
        - $ref: "#/components/parameters/TagId"

      responses:
        "204":
          description: Tag deleted

components:
  parameters:
    TaskId:
      in: path
      name: taskId
      required: true
      schema:
        type: string

    ProjectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string

    TagId:
      in: path
      name: tagId
      required: true
      schema:
        type: string

  schemas:
    TaskStatus:
      type: string
      enum:
        - inbox
        - next
        - waiting
        - someday
        - done

    Task:
      type: object

      required:
        - id
        - title
        - status
        - tags
        - createdAt
        - updatedAt

      properties:
        id:
          type: string

        title:
          type: string

        notes:
          type: string

        status:
          $ref: "#/components/schemas/TaskStatus"

        projectId:
          type: string
          nullable: true

        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"

        dueAt:
          type: string
          nullable: true
          format: date-time

        completedAt:
          type: string
          nullable: true
          format: date-time

        createdAt:
          type: string
          format: date-time

        updatedAt:
          type: string
          format: date-time

    CreateTaskRequest:
      type: object

      required:
        - title

      properties:
        title:
          type: string

        notes:
          type: string

        status:
          $ref: "#/components/schemas/TaskStatus"

        projectId:
          type: string
          nullable: true

        tagIds:
          type: array
          items:
            type: string

        dueAt:
          type: string
          nullable: true
          format: date-time

    UpdateTaskRequest:
      type: object

      properties:
        title:
          type: string

        notes:
          type: string

        status:
          $ref: "#/components/schemas/TaskStatus"

        projectId:
          type: string
          nullable: true

        tagIds:
          type: array
          items:
            type: string

        dueAt:
          type: string
          nullable: true
          format: date-time

        completedAt:
          type: string
          nullable: true
          format: date-time

    Project:
      type: object

      required:
        - id
        - name
        - archived

      properties:
        id:
          type: string

        name:
          type: string

        archived:
          type: boolean

        createdAt:
          type: string
          format: date-time

        updatedAt:
          type: string
          format: date-time

    CreateProjectRequest:
      type: object

      required:
        - name

      properties:
        name:
          type: string

    UpdateProjectRequest:
      type: object

      properties:
        name:
          type: string

        archived:
          type: boolean

    Tag:
      type: object

      required:
        - id
        - name

      properties:
        id:
          type: string

        name:
          type: string

        createdAt:
          type: string
          format: date-time

    CreateTagRequest:
      type: object

      required:
        - name

      properties:
        name:
          type: string

    UpdateTagRequest:
      type: object

      properties:
        name:
          type: string
