info:
  name: getTask
  type: http
  seq: 3
  tags:
    - Tasks

http:
  method: GET
  url: "{{baseUrl}}/tasks/:taskId"
  params:
    - name: taskId
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Task
    request:
      url: "{{baseUrl}}/tasks/:taskId"
      method: GET
      params:
        - name: taskId
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "title": "",
            "notes": "",
            "status": "inbox",
            "projectId": "",
            "tags": [
              {
                "id": "",
                "name": "",
                "createdAt": ""
              }
            ],
            "dueAt": "",
            "completedAt": "",
            "createdAt": "",
            "updatedAt": ""
          }
  - name: 404 Response
    description: Task not found
    request:
      url: "{{baseUrl}}/tasks/:taskId"
      method: GET
      params:
        - name: taskId
          value: ""
          type: path
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
