info:
  name: createTag
  type: http
  seq: 2
  tags:
    - Tags

http:
  method: POST
  url: "{{baseUrl}}/tags"
  body:
    type: json
    data: |-
      {
        "name": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Tag created
    request:
      url: "{{baseUrl}}/tags"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": ""
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "name": "",
            "createdAt": ""
          }
