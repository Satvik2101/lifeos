info:
  name: listTags
  type: http
  seq: 1
  tags:
    - Tags

http:
  method: GET
  url: "{{baseUrl}}/tags"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Tag list
    request:
      url: "{{baseUrl}}/tags"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "items": [
              {
                "id": "",
                "name": "",
                "createdAt": ""
              }
            ]
          }
